server {
    listen 80;
    server_name nexus.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nexus.local;

    # ── SSL (self-signed for dev, certbot for prod) ──────────────────────────
    ssl_certificate     /etc/ssl/certs/nexus.crt;
    ssl_certificate_key /etc/ssl/private/nexus.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Frontend (production build) ──────────────────────────────────────────
    root /var/www/nexus;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── Backend API proxy ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长超时 + 禁用缓冲（SSE 流式需要）
        proxy_read_timeout 300;
        proxy_connect_timeout 30;
        proxy_buffering off;
        proxy_cache off;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── WebSocket proxy ─────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Static files (avatars) ─────────────────────────────────────────────
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/nexus-access.log;
    error_log  /var/log/nginx/nexus-error.log;
}